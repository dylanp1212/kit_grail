default:
  image: node:20

stages:
  - check
  - build
  - test

variables:
  npm_config_cache: $CI_PROJECT_DIR/.npm

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/

.check_template:
  stage: check
  before_script:
    - cd $APP_DIR
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint
    - npm run cpd

.build_template:
  stage: build
  before_script:
    - cd $APP_DIR
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build

.test_template:
  stage: test
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: postgres
    # 32-byte placeholder for tests only; real SECRET stays in .env / EC2 env
    SECRET: ci-test-secret-32-bytes-paddingx
    GOOGLE_CLIENT_ID: ci-test-google-client-id
    GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
    STRIPE_SECRET_KEY: sk_test_ci_dummy
    STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
  before_script:
    - cd $APP_DIR
    - npm ci --prefer-offline --no-audit
  script:
    - npm test

# --- Check (lint + cpd) ---
# CheckoutMS skipped — no lint or cpd scripts defined

check:auth-service:
  extends: .check_template
  variables:
    APP_DIR: App/AuthService

check:kit-listing-ms:
  extends: .check_template
  variables:
    APP_DIR: App/Kit_ListingMS

check:kit-history-ms:
  extends: .check_template
  variables:
    APP_DIR: App/KitHistoryMS

check:wishlist-ms:
  extends: .check_template
  variables:
    APP_DIR: App/WishlistMS

check:shopping-cart-ms:
  extends: .check_template
  variables:
    APP_DIR: App/ShoppingCartMS

check:shopper:
  extends: .check_template
  variables:
    APP_DIR: App/Shopper

check:admin:
  extends: .check_template
  variables:
    APP_DIR: App/Admin

check:seller-backend:
  extends: .check_template
  variables:
    APP_DIR: App/Seller/backend

check:seller-frontend:
  extends: .check_template
  variables:
    APP_DIR: App/Seller/frontend

# --- Build ---

build:auth-service:
  extends: .build_template
  variables:
    APP_DIR: App/AuthService

build:kit-listing-ms:
  extends: .build_template
  variables:
    APP_DIR: App/Kit_ListingMS

build:kit-history-ms:
  extends: .build_template
  variables:
    APP_DIR: App/KitHistoryMS

build:wishlist-ms:
  extends: .build_template
  variables:
    APP_DIR: App/WishlistMS

build:shopping-cart-ms:
  extends: .build_template
  variables:
    APP_DIR: App/ShoppingCartMS

build:checkout-ms:
  extends: .build_template
  variables:
    APP_DIR: App/CheckoutMS

build:shopper:
  extends: .build_template
  variables:
    APP_DIR: App/Shopper

build:admin:
  extends: .build_template
  variables:
    APP_DIR: App/Admin

build:seller-backend:
  extends: .build_template
  variables:
    APP_DIR: App/Seller/backend

build:seller-frontend:
  extends: .build_template
  variables:
    APP_DIR: App/Seller/frontend

# --- Test ---
# test:shopper deferred — viewListing dir case mismatch breaks lint on Linux.
# Add back after the directory is renamed to lowercase.

test:auth-service:
  extends: .test_template
  variables:
    APP_DIR: App/AuthService

test:kit-listing-ms:
  extends: .test_template
  variables:
    APP_DIR: App/Kit_ListingMS

test:kit-history-ms:
  extends: .test_template
  # pgvector required for vector similarity search tests
  services:
    - name: pgvector/pgvector:pg16
      alias: postgres
  variables:
    APP_DIR: App/KitHistoryMS

test:wishlist-ms:
  extends: .test_template
  variables:
    APP_DIR: App/WishlistMS

test:shopping-cart-ms:
  extends: .test_template
  variables:
    APP_DIR: App/ShoppingCartMS

test:checkout-ms:
  extends: .test_template
  variables:
    APP_DIR: App/CheckoutMS

test:admin:
