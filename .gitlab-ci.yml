default:
  image: node:20

stages:
  - check
  - test

variables:
  npm_config_cache: $CI_PROJECT_DIR/.npm

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/

.check_template:
  stage: check
  before_script:
    - cd $APP_DIR
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint
    - npm run cpd
    - npm run build

.test_template:
  stage: test
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: postgres
    # 32-byte placeholder for tests only; real SECRET stays in .env / EC2 env
    SECRET: ci-test-secret-32-bytes-paddingx
    GOOGLE_CLIENT_ID: ci-test-google-client-id
    GOOGLE_CLIENT_SECRET: ci-test-google-client-secret
  before_script:
    - cd $APP_DIR
    - npm ci --prefer-offline --no-audit
  script:
    - npm test

check:auth-service:
  extends: .check_template
  variables:
    APP_DIR: App/AuthService

check:kit-listing-ms:
  extends: .check_template
  variables:
    APP_DIR: App/Kit_ListingMS

check:wishlist-ms:
  extends: .check_template
  variables:
    APP_DIR: App/WishlistMS

check:shopping-cart-ms:
  extends: .check_template
  variables:
    APP_DIR: App/ShoppingCartMS

check:shopper:
  extends: .check_template
  variables:
    APP_DIR: App/Shopper

check:kit-history-ms:
  extends: .check_template
  variables:
    APP_DIR: App/KitHistoryMS

check:seller-backend:
  extends: .check_template
  variables:
    APP_DIR: App/Seller/backend

check:seller-frontend:
  extends: .check_template
  variables:
    APP_DIR: App/Seller/frontend

check:helloworld:
  extends: .check_template
  variables:
    APP_DIR: App/HelloWorld

test:auth-service:
  extends: .test_template
  variables:
    APP_DIR: App/AuthService

test:kit-listing-ms:
  extends: .test_template
  variables:
    APP_DIR: App/Kit_ListingMS

test:wishlist-ms:
  extends: .test_template
  variables:
    APP_DIR: App/WishlistMS

test:shopping-cart-ms:
  extends: .test_template
  variables:
    APP_DIR: App/ShoppingCartMS

# test:shopper deferred — viewListing dir case mismatch breaks lint on Linux.
