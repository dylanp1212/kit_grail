services:
  app:
    container_name: kitgrail
    env_file: .env
    build: .
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  postgres:
    container_name: kitgrail-db
    image: postgres:alpine
    environment:
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./Shopper/sql/databases.sql:/docker-entrypoint-initdb.d/1.databases.sql
      - ./Shopper/sql/schema.sql:/docker-entrypoint-initdb.d/2.schema.sql
      - ./Shopper/sql/data.sql:/docker-entrypoint-initdb.d/3.data.sql
      - ./CheckoutMS/sql/schema.sql:/docker-entrypoint-initdb.d/4.checkout.schema.sql
      - ./CheckoutMS/sql/data.sql:/docker-entrypoint-initdb.d/5.checkout.data.sql
